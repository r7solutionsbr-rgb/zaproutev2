name: CI - ZapRoute v2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-validation:
    name: 🛡️ Backend (NestJS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zaproute_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: ./server
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install Dependencies
      run: npm ci

    # Lint (if available) - Commented out until configured
    # - name: Lint
    #   run: npm run lint

    # Build Verification
    - name: Build
      run: npm run build

    # Unit Tests
    - name: Run Unit Tests
      run: npm run test
      env:
        CI: true
        NODE_ENV: test
        DATABASE_URL: "postgresql://test:test@localhost:5432/zaproute_test"
        JWT_SECRET: "mock-secret-for-ci-32-characters-minimum"

  frontend-validation:
    name: 🎨 Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Dependencies
      run: npm ci

    # Lint (if available) - Commented out until configured
    # - name: Lint
    #   run: npm run lint

    # Type Check (TypeScript)
    - name: Type Check
      run: npx tsc --noEmit

    # Build Verification (Vite build)
    - name: Build
      run: npm run build
      env:
        CI: true
