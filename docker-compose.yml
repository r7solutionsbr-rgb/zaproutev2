version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zaproute_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zaproute}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zaproute_api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    depends_on:
      - postgres

volumes:
  postgres_data:
